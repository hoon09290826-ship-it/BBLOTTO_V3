<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BBLOTTO PRO V50 최초 관리자 생성</title>
  <link rel="stylesheet" href="/style.css?v=50-clean">
</head>
<body class="loginBody">
  <div class="loginCard">
    <div class="eyebrow">BBLOTTO PRO V50</div>
    <h1>최초 관리자 생성</h1>
    <p>처음 설치할 때 한 번만 최고 관리자 계정을 생성합니다.</p>
    <label>관리자 아이디</label>
    <input id="setupId" autocomplete="username" placeholder="예: admin">
    <label>관리자명</label>
    <input id="setupName" placeholder="예: 대표 관리자">
    <label>비밀번호</label>
    <input id="setupPw" type="password" autocomplete="new-password" placeholder="8자리 이상">
    <label>비밀번호 확인</label>
    <input id="setupPw2" type="password" autocomplete="new-password" placeholder="비밀번호 확인">
    <button class="primary big" id="setupBtn">최초 관리자 생성</button>
    <div id="setupMsg" class="msg"></div>
    <small>생성 후에는 관리자 메뉴에서만 추가 계정을 만들 수 있습니다.</small>
  </div>
  <script src="/setup.js?v=50-clean"></script>
</body>
</html>
